
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | My Website</title>
<link rel="stylesheet" href="Style.css">
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="About.html">About</a>
    <a href="Contact.html" class="active">Contact</a>
</nav>

<section class="scroll-section">

<h1>Contact Me</h1>
<p>Want a website? Send me a message below!</p>
<!-- Contact Form -->
<form id="contactForm" action="https://formspree.io/f/https://formspree.io/f/xvzwvrov" method="POST" class="contact-form">
  <h2>Contact Us</h2>

  <label for="name">Name:</label>
  <input type="text" id="name" name="name" placeholder="Your Name" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" placeholder="Your Email" required>

  <label for="message">Message:</label>
  <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>

  <button type="submit">Send Message</button>
</form>

<!-- Success Message Popup -->
<div id="successMessage" style="display:none; text-align:center; padding:20px; background:#d4edda; color:#155724; border-radius:12px; margin:20px auto; max-width:500px;">
  ✅ Thank you! Your message has been sent.
</div>

<!-- Styles -->
<style>
  .contact-form {
    max-width: 500px;
    margin: 40px auto;
    padding: 25px;
    background-color: #f9f9f9;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
  }

  .contact-form h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
  }

  .contact-form label {
    display: block;
    margin: 12px 0 6px;
    color: #555;
  }

  .contact-form input,
  .contact-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 16px;
  }

  .contact-form button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .contact-form button:hover {
    background-color: #0056b3;
  }

  @media (max-width: 600px) {
    .contact-form {
      padding: 20px;
      margin: 20px;
    }
  }
</style>

<!-- JavaScript for Popup -->
<script>
  const form = document.getElementById('contactForm');
  const successMessage = document.getElementById('successMessage');

  form.addEventListener('submit', async function(e) {
    e.preventDefault(); // prevent default form submission

    const formData = new FormData(form);

    // Send form to Formspree
    const response = await fetch(form.action, {
      method: form.method,
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      form.style.display = 'none'; // hide the form
      successMessage.style.display = 'block'; // show the thank-you message
    } else {
      alert('Oops! There was a problem sending your message.');
    }
  });
</script>

<section class="scroll-section">
    <h2>Follow Me</h2>
    <p>Connect on social media for updates and projects.</p>
    <p>
        <a class="btn" href="https://twitter.com/" target="_blank">Twitter</a>
        <a class="btn" href="https://github.com/" target="_blank">GitHub</a>
    </p>
</section>

<footer>
    <p>&copy; 2026 My Website. All rights reserved.</p>
      <p>
        Follow me: 
        <a href="https://twitter.com" target="_blank">🐦 Twitter</a> | 
        <a href="https://facebook.com" target="_blank">📘 Facebook</a> | 
        <a href="https://instagram.com" target="_blank">📸 Instagram</a>
    </p>
</footer>

<script>
const sections = document.querySelectorAll('.scroll-section');
function revealSections() {
    const triggerBottom = window.innerHeight * 0.85;
    sections.forEach(section => {
        const sectionTop = section.getBoundingClientRect().top;
        if(sectionTop < triggerBottom) section.classList.add('visible');
    });
}
window.addEventListener('scroll', revealSections);
window.addEventListener('load', revealSections);
</script>

</body>
</html>
